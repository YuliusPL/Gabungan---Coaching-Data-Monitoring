<div id="v-coaching" style="display:none">
  <div class="card-mewah shadow-sm">
    <h6 class="fw-bold text-primary mb-3">INPUT COACHING</h6>

    <div class="row g-2">
      <div class="col-12">
        <label class="coaching-form-label">Nama Staff</label>
        <input type="text" id="c-staff" class="form-control" placeholder="Pilih dari tabel di bawah atau isi manual">
      </div>

      <div class="col-12">
        <label class="coaching-form-label">Cabang</label>
        <input type="text" id="c-cabang" class="form-control" placeholder="Cabang">
      </div>

      <div class="col-12">
        <label class="coaching-form-label">Root Cause</label>
        <textarea id="c-root" class="form-control" rows="3" placeholder="Isi akar masalah"></textarea>
      </div>

      <div class="col-12">
        <label class="coaching-form-label">Topic Coaching</label>
        <input type="text" id="c-topic" class="form-control" placeholder="Topik coaching">
      </div>

      <div class="col-12">
        <label class="coaching-form-label">Target / Action Plan</label>
        <textarea id="c-target" class="form-control" rows="3" placeholder="Target perbaikan / tindak lanjut"></textarea>
      </div>

      <div class="col-6">
        <label class="coaching-form-label">BM</label>
        <input type="text" id="c-bm" class="form-control" placeholder="Nama BM">
      </div>

      <div class="col-6">
        <label class="coaching-form-label">Region</label>
        <input type="text" id="c-region" class="form-control" placeholder="Region">
      </div>

      <div class="col-12">
        <label class="coaching-form-label">Last Performance</label>
        <input type="text" id="c-perf" class="form-control" placeholder="Contoh: Ach 65% / Pipeline 3M">
      </div>

      <div class="col-12">
        <input type="hidden" id="c-parent-id">
        <button class="btn btn-primary w-100 fw-bold py-3 mt-2" onclick="saveCoachingInteractive()">
          SIMPAN COACHING
        </button>
      </div>
    </div>
  </div>

  <h6 class="section-title px-2">Daftar Karyawan</h6>
  <div class="card-mewah p-0 overflow-hidden shadow-sm">
    <div style="max-height:420px; overflow-y:auto">
      <table class="table table-sm table-hover mb-0 table-interaktif sticky-table-head">
        <thead>
          <tr>
            <th onclick="sortCoachingInteractive('nik')">NIK</th>
            <th onclick="sortCoachingInteractive('nama')">NAMA</th>
            <th onclick="sortCoachingInteractive('cab')">CABANG</th>
            <th onclick="sortCoachingInteractive('jab')">JABATAN</th>
            <th onclick="sortCoachingInteractive('status')">STATUS</th>
          </tr>
        </thead>
        <tbody id="coaching-table-body">
          <tr>
            <td colspan="5" class="empty-state">Memuat data coaching...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
