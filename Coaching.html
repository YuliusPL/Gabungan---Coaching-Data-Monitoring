<div id="v-coaching" class="view-section">
  <div class="section-hero section-hero-coaching">
    <div>
      <span class="section-chip">Coaching Center</span>
      <h2>Pendampingan Staff</h2>
      <p>Pilih karyawan dari daftar, catat root cause, lalu simpan action plan atau follow up coaching.</p>
    </div>
    <div class="hero-icon">
      <i class="bi bi-person-badge-fill"></i>
    </div>
  </div>

  <div class="content-grid coaching-grid">
    <div class="card-mewah coaching-form-card">
      <div class="card-title-row">
        <div>
          <span class="eyebrow">Form Input</span>
          <h3>Coaching / Follow Up</h3>
        </div>
        <i class="bi bi-pencil-square card-watermark"></i>
      </div>

      <input type="hidden" id="c-parent-id">

      <div class="form-grid">
        <div class="form-group span-2">
          <label class="form-label-lite">Nama Staff</label>
          <input type="text" id="c-staff" class="form-control" placeholder="Pilih dari tabel atau isi manual">
        </div>

        <div class="form-group">
          <label class="form-label-lite">Cabang</label>
          <input type="text" id="c-cabang" class="form-control" placeholder="Cabang">
        </div>

        <div class="form-group">
          <label class="form-label-lite">Last Performance</label>
          <input type="text" id="c-perf" class="form-control" placeholder="Contoh: Ach 65%">
        </div>

        <div class="form-group">
          <label class="form-label-lite">BM</label>
          <input type="text" id="c-bm" class="form-control" placeholder="Nama BM">
        </div>

        <div class="form-group">
          <label class="form-label-lite">Region</label>
          <input type="text" id="c-region" class="form-control" placeholder="Region">
        </div>

        <div class="form-group span-2">
          <label class="form-label-lite">Root Cause</label>
          <textarea id="c-root" class="form-control" rows="4" placeholder="Tuliskan akar masalah yang perlu ditindaklanjuti"></textarea>
        </div>

        <div class="form-group span-2">
          <label class="form-label-lite">Topic Coaching</label>
          <input type="text" id="c-topic" class="form-control" placeholder="Topik pembahasan coaching">
        </div>

        <div class="form-group span-2">
          <label class="form-label-lite">Target / Action Plan</label>
          <textarea id="c-target" class="form-control" rows="4" placeholder="Target perbaikan, komitmen, dan rencana tindak lanjut"></textarea>
        </div>

        <button class="btn btn-coaching span-2" onclick="saveCoachingInteractive()">
          <i class="bi bi-check2-circle me-2"></i>Simpan Coaching
        </button>
      </div>
    </div>

    <div class="card-mewah p-0 overflow-hidden">
      <div class="table-card-head">
        <div>
          <span class="eyebrow">Monitoring</span>
          <h3>Daftar Karyawan</h3>
        </div>
        <span class="table-hint">Klik header untuk sort</span>
      </div>

      <div class="table-scroll coaching-table-scroll">
        <table class="table-interaktif sticky-table-head">
          <thead>
            <tr>
              <th onclick="sortCoachingInteractive('nik')">NIK</th>
              <th onclick="sortCoachingInteractive('nama')">Nama</th>
              <th onclick="sortCoachingInteractive('cab')">Cabang</th>
              <th onclick="sortCoachingInteractive('jab')">Jabatan</th>
              <th onclick="sortCoachingInteractive('status')">Status</th>
            </tr>
          </thead>
          <tbody id="coaching-table-body">
            <tr>
              <td colspan="5" class="empty-state">Memuat data karyawan...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
