<style>
  :root {
    --primary: #0f3d75;
    --primary-2: #1764b7;
    --app-blue: #0f8c95;
    --coaching-main: #7a4ff3;
    --admin-main: #de7a16;
    --cair-green: #1c8d54;
    --rej-red: #dc3545;
    --bel-yellow: #ffc107;
    --pen-orange: #fd7e14;
    --bg: #eef3fb;
    --surface: rgba(255, 255, 255, 0.86);
    --surface-solid: #ffffff;
    --text-main: #10233c;
    --text-soft: #6c7d92;
    --line: rgba(15, 35, 60, 0.08);
    --shadow-soft: 0 14px 38px rgba(15, 35, 60, 0.10);
    --shadow-card: 0 10px 28px rgba(15, 35, 60, 0.07);
    --radius-lg: 24px;
    --radius-md: 18px;
    --radius-sm: 14px;
  }

  * {
    -webkit-tap-highlight-color: transparent;
    box-sizing: border-box;
  }

  html,
  body {
    width: 100%;
    min-height: 100%;
    margin: 0;
    padding: 0;
    overflow-x: hidden;
    color: var(--text-main);
    font-family: 'Plus Jakarta Sans', sans-serif;
    background:
      radial-gradient(circle at top left, rgba(23, 100, 183, 0.12), transparent 28%),
      radial-gradient(circle at top right, rgba(122, 79, 243, 0.10), transparent 24%),
      linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
  }

  body {
    padding-bottom: 104px;
  }

  button,
  input,
  select,
  textarea {
    font-family: inherit;
  }

  #app-shell {
    width: 100%;
    overflow: hidden;
  }

  .top-shell {
    position: sticky;
    top: 0;
    z-index: 30;
    backdrop-filter: blur(18px);
  }

  .header-box {
    color: #fff;
    padding: 18px 16px 14px;
    border-radius: 0 0 30px 30px;
    background:
      linear-gradient(135deg, rgba(255,255,255,0.10), rgba(255,255,255,0)),
      linear-gradient(145deg, #08294f 0%, #0f3d75 54%, #1764b7 100%);
    box-shadow: 0 16px 32px rgba(10, 38, 75, 0.20);
  }

  .header-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 14px;
  }

  .header-label {
    margin-bottom: 6px;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.12em;
    opacity: 0.82;
  }

  .header-name {
    margin: 0;
    font-size: 18px;
    font-weight: 800;
    line-height: 1.15;
  }

  .header-sub {
    max-width: 560px;
    margin-top: 7px;
    font-size: 11px;
    line-height: 1.45;
    opacity: 0.84;
  }

  .refresh-btn {
    min-width: 94px;
    border: 1px solid rgba(255,255,255,0.24);
    border-radius: 16px;
    padding: 10px 12px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: #fff;
    background: rgba(255,255,255,0.12);
    font-size: 11px;
    font-weight: 800;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
  }

  .header-menu-slider {
    display: flex;
    gap: 10px;
    margin-top: 15px;
    padding-bottom: 2px;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .header-menu-slider::-webkit-scrollbar {
    display: none;
  }

  .quick-tab {
    border: none;
    border-radius: 999px;
    padding: 10px 14px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
    color: rgba(255,255,255,0.88);
    background: rgba(255,255,255,0.11);
    font-size: 11px;
    font-weight: 800;
    transition: all 0.2s ease;
  }

  .quick-tab.active {
    color: #fff;
    transform: translateY(-1px);
    box-shadow: 0 8px 18px rgba(0,0,0,0.15);
  }

  .quick-home.active { background: linear-gradient(135deg, #2b77d0, #0f4d99); }
  .quick-pipe.active { background: linear-gradient(135deg, #24b5b3, #0f8c95); }
  .quick-coaching.active { background: linear-gradient(135deg, #9668ff, #7a4ff3); }
  .quick-report.active { background: linear-gradient(135deg, #4a6fae, #2f4f86); }
  .quick-admin.active { background: linear-gradient(135deg, #f6a13a, #de7a16); }

  .page-container {
    width: 100%;
    overflow: visible;
  }

  .page-track {
    width: 100%;
    display: block;
    transform: none !important;
  }

  .page-panel {
    width: 100%;
    display: none;
  }

  .page-panel.active {
    display: block;
  }

  .page-scroll {
    width: 100%;
    max-width: 1180px;
    margin: 0 auto;
    padding: 14px 14px 8px;
  }

  .dashboard-grid,
  .pipeline-grid,
  .coaching-grid,
  .admin-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
  }

  .card-mewah {
    border: 1px solid rgba(255,255,255,0.74);
    border-radius: var(--radius-lg);
    padding: 16px;
    margin-bottom: 14px;
    background: var(--surface);
    backdrop-filter: blur(14px);
    box-shadow: var(--shadow-card);
  }

  .card-mewah.flush {
    padding: 0;
    overflow: hidden;
  }

  .hero-stat {
    color: #fff;
    background:
      radial-gradient(circle at 18% 0%, rgba(255,255,255,0.22), transparent 26%),
      linear-gradient(145deg, #143866 0%, #0f63b5 100%);
    box-shadow: 0 18px 34px rgba(15, 61, 117, 0.20);
  }

  #v-pipe .hero-stat {
    background:
      radial-gradient(circle at 18% 0%, rgba(255,255,255,0.20), transparent 26%),
      linear-gradient(145deg, #0b6f78 0%, #16a8a2 100%);
  }

  .section-chip {
    border-radius: 999px;
    padding: 7px 12px;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-size: 10px;
    font-weight: 800;
    margin-bottom: 10px;
  }

  .chip-home { color: var(--primary); background: rgba(23, 100, 183, 0.11); }
  .chip-pipe { color: var(--app-blue); background: rgba(15, 140, 149, 0.12); }
  .chip-coaching { color: var(--coaching-main); background: rgba(122, 79, 243, 0.12); }
  .chip-admin { color: var(--admin-main); background: rgba(222, 122, 22, 0.13); }
  .pipe-chip { color: var(--app-blue); background: rgba(15, 140, 149, 0.12); }
  .admin-chip { color: var(--admin-main); background: rgba(222, 122, 22, 0.13); }

  .section-hero {
    border-radius: 28px;
    padding: 18px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    background: rgba(255,255,255,0.72);
    border: 1px solid rgba(255,255,255,0.78);
    box-shadow: var(--shadow-card);
  }

  .section-hero h2,
  .section-hero p {
    margin: 0;
  }

  .section-hero h2 {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.02em;
  }

  .section-hero p {
    margin-top: 6px;
    color: var(--text-soft);
    font-size: 12px;
    line-height: 1.5;
  }

  .home-hero {
    background:
      radial-gradient(circle at 100% 0%, rgba(23, 100, 183, 0.16), transparent 30%),
      rgba(255,255,255,0.78);
  }

  .pipe-hero {
    background:
      radial-gradient(circle at 100% 0%, rgba(15, 140, 149, 0.18), transparent 30%),
      rgba(255,255,255,0.78);
  }

  .section-hero-coaching {
    background:
      radial-gradient(circle at 100% 0%, rgba(122, 79, 243, 0.18), transparent 32%),
      rgba(255,255,255,0.78);
  }

  .hero-mini,
  .hero-icon {
    width: 48px;
    height: 48px;
    border-radius: 18px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex: 0 0 auto;
    color: #fff;
    font-size: 22px;
    background: linear-gradient(135deg, var(--primary-2), var(--primary));
    box-shadow: 0 12px 24px rgba(15, 61, 117, 0.18);
  }

  .section-hero-coaching .hero-icon {
    background: linear-gradient(135deg, #9668ff, #7a4ff3);
  }

  .section-title-main {
    margin: 0 0 6px;
    font-size: 18px;
    font-weight: 800;
    color: var(--text-main);
  }

  .section-desc {
    margin: 0;
    color: var(--text-soft);
    font-size: 12px;
    line-height: 1.5;
  }

  .section-title {
    margin: 0 0 9px;
    color: var(--text-soft);
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .section-head,
  .card-title-row,
  .table-card-head,
  .table-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
  }

  .section-subtitle,
  .card-title-row h3,
  .table-card-head h3 {
    margin: 0;
    color: var(--text-main);
    font-size: 16px;
    font-weight: 800;
  }

  .eyebrow,
  .table-hint {
    color: var(--text-soft);
    font-size: 10px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .card-watermark {
    color: rgba(122, 79, 243, 0.18);
    font-size: 34px;
  }

  .filter-card {
    padding: 14px;
  }

  .filter-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
  }

  .home-layout {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
  }

  .home-total-card {
    display: grid;
    grid-template-columns: 132px 1fr;
    align-items: center;
    gap: 16px;
    min-height: 190px;
  }

  .gauge-wrap {
    position: relative;
    width: 132px;
    height: 132px;
  }

  .gauge-wrap canvas {
    width: 132px !important;
    height: 132px !important;
  }

  .gauge-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transform: translateY(8px);
    text-align: center;
  }

  .gauge-center span {
    font-size: 24px;
    font-weight: 800;
  }

  .gauge-center small,
  .hero-stat-copy p,
  .target-pill span {
    color: rgba(255,255,255,0.72);
    font-size: 10px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .hero-stat-copy h3 {
    margin: 4px 0 12px;
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.03em;
  }

  .target-pill {
    border-radius: 18px;
    padding: 12px;
    background: rgba(255,255,255,0.12);
  }

  .target-pill b {
    display: block;
    margin-top: 4px;
    color: #fff;
    font-size: 18px;
  }

  .role-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 10px;
    color: var(--text-soft);
    font-size: 11px;
    font-weight: 800;
  }

  .role-head i {
    width: 30px;
    height: 30px;
    border-radius: 12px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    background: linear-gradient(135deg, var(--primary-2), var(--primary));
  }

  .role-spv .role-head i {
    background: linear-gradient(135deg, #24b5b3, #0f8c95);
  }

  .jab-detail {
    display: grid;
    grid-template-columns: 1fr;
    gap: 2px;
  }

  .jab-detail b {
    color: var(--text-main);
    font-size: 11px;
  }

  .cair-list {
    margin-top: 14px;
  }

  .metric-card {
    min-height: 122px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .metric-label {
    color: var(--text-soft);
    font-size: 10px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .metric-value {
    display: block;
    margin: 8px 0 4px;
    color: var(--text-main);
    font-size: 21px;
    font-weight: 800;
    letter-spacing: -0.03em;
  }

  .metric-card small {
    color: var(--text-soft);
    font-size: 11px;
  }

  .pipe-text {
    color: var(--app-blue);
  }

  .metric-wide {
    grid-column: span 2;
  }

  .pipe-total-card {
    background:
      radial-gradient(circle at 100% 0%, rgba(255,255,255,0.24), transparent 30%),
      linear-gradient(145deg, #0b6f78 0%, #16a8a2 100%);
  }

  .desktop-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
    margin-bottom: 14px;
  }

  .desktop-grid.two-col,
  .desktop-grid.three-col {
    align-items: start;
  }

  .chart-card {
    min-height: 220px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .chart-card canvas {
    max-height: 210px;
  }

  .list-card {
    min-height: 120px;
  }

  #v-pipe {
    min-height: 60vh;
  }

  .table-toolbar,
  .table-card-head {
    padding: 14px 16px;
    border-bottom: 1px solid var(--line);
    background: rgba(255,255,255,0.58);
  }

  .table-toolbar {
    align-items: flex-start;
    flex-direction: column;
  }

  .table-toolbar b {
    display: block;
    font-size: 13px;
    font-weight: 800;
  }

  .table-toolbar small {
    color: var(--text-soft);
    font-size: 11px;
  }

  .table-toolbar input {
    width: 100%;
  }

  .table-scroll {
    max-height: 460px;
    overflow: auto;
  }

  .table-footer {
    padding: 10px 12px;
    border-top: 1px solid var(--line);
    color: var(--text-soft);
    background: rgba(255,255,255,0.60);
    font-size: 11px;
    font-weight: 700;
    text-align: center;
  }

  .data-table {
    font-size: 10px;
  }

  .data-table thead th {
    position: sticky;
    top: 0;
    z-index: 2;
    border: none;
    padding: 11px 10px;
    color: #fff;
    background: #0f2746;
    white-space: nowrap;
  }

  .data-table thead th[onclick] {
    cursor: pointer;
    user-select: none;
  }

  .data-table thead th[onclick]:hover {
    background: #163a62;
  }

  .data-table td {
    padding: 10px;
    vertical-align: middle;
    border-color: rgba(15, 35, 60, 0.06);
  }

  .content-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
  }

  .coaching-form-card {
    background:
      radial-gradient(circle at 100% 0%, rgba(122, 79, 243, 0.12), transparent 28%),
      rgba(255,255,255,0.86);
  }

  .coaching-reminder-card,
  .coaching-report-card {
    background:
      radial-gradient(circle at 100% 0%, rgba(122, 79, 243, 0.08), transparent 32%),
      rgba(255,255,255,0.9);
  }

  .coaching-reminder-intro,
  .coaching-report-hint {
    font-size: 12px;
    color: var(--text-soft);
    margin: 0 0 14px;
    line-height: 1.55;
  }

  .coaching-reminder-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
  }

  .coaching-reminder-box {
    border: 1px solid rgba(122, 79, 243, 0.14);
    border-radius: 16px;
    padding: 12px;
    background: rgba(255, 255, 255, 0.72);
  }

  .coaching-reminder-box-head {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 10px;
    font-size: 12px;
    font-weight: 800;
    color: var(--text-main);
  }

  .coaching-reminder-list {
    max-height: 220px;
    overflow-y: auto;
    font-size: 11px;
  }

  .coaching-reminder-line {
    padding: 8px 0;
    border-bottom: 1px solid rgba(15, 35, 60, 0.06);
  }

  .coaching-reminder-line:last-child {
    border-bottom: none;
  }

  .coaching-reminder-line strong {
    display: block;
    font-size: 12px;
    font-weight: 800;
  }

  .coaching-reminder-line span {
    display: block;
    color: var(--text-main);
    margin-top: 2px;
  }

  .coaching-reminder-line small {
    display: block;
    color: var(--text-soft);
    margin-top: 2px;
    font-weight: 600;
  }

  .empty-state.small {
    font-size: 11px;
    padding: 10px;
  }

  .coaching-report-toolbar {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 12px;
  }

  .coaching-report-filters {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
  }

  .coaching-report-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }

  .coaching-report-scroll {
    max-height: 420px;
    border-radius: 12px;
    border: 1px solid rgba(15, 35, 60, 0.08);
  }

  .coaching-report-table {
    font-size: 11px;
  }

  .coaching-report-table th,
  .coaching-report-table td {
    white-space: normal;
    word-break: break-word;
    max-width: 180px;
    vertical-align: top;
  }

  @media (min-width: 992px) {
    .coaching-reminder-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .coaching-report-filters {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .coaching-report-filters .span-2 {
      grid-column: span 2;
    }
  }

  .form-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
    margin-top: 16px;
  }

  .form-group {
    min-width: 0;
  }

  .span-2 {
    grid-column: span 2;
  }

  .coaching-table-scroll {
    max-height: 560px;
  }

  .coaching-toolbar {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .coaching-filter-label {
    display: inline-flex;
    align-items: center;
    border-radius: 999px;
    padding: 8px 12px;
    background: rgba(122, 79, 243, 0.10);
    color: var(--coaching-main);
    font-size: 11px;
    font-weight: 800;
  }

  .coaching-status-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
    margin-bottom: 14px;
  }

  .coaching-region-card-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
    margin-bottom: 14px;
  }

  .coaching-region-card {
    border: 1px solid rgba(122, 79, 243, 0.18);
    border-radius: 18px;
    padding: 14px;
    background:
      radial-gradient(circle at 100% 0%, rgba(122,79,243,0.10), transparent 45%),
      rgba(255,255,255,0.90);
    cursor: pointer;
    transition: all 0.18s ease;
    box-shadow: 0 8px 18px rgba(15, 35, 60, 0.06);
  }

  .coaching-region-card:hover {
    transform: translateY(-1px);
    box-shadow: var(--shadow-card);
  }

  .coaching-region-card strong {
    display: block;
    font-size: 24px;
    font-weight: 800;
    color: var(--text-main);
    line-height: 1.1;
  }

  .coaching-region-card span {
    display: block;
    margin-top: 4px;
    font-size: 11px;
    font-weight: 800;
    color: var(--text-main);
    text-transform: uppercase;
  }

  .coaching-region-card small {
    display: block;
    margin-top: 6px;
    color: var(--text-soft);
    font-size: 10px;
    font-weight: 700;
  }

  .coaching-region-card.active {
    border-color: rgba(122, 79, 243, 0.46);
    background:
      radial-gradient(circle at 100% 0%, rgba(122,79,243,0.18), transparent 45%),
      rgba(255,255,255,0.96);
    box-shadow: 0 12px 24px rgba(122, 79, 243, 0.18);
  }

  .coaching-status-card {
    position: relative;
    overflow: hidden;
    border-left: 5px solid rgba(15, 35, 60, 0.22);
    cursor: pointer;
    min-height: 104px;
    transition: transform 0.18s ease, box-shadow 0.18s ease;
  }

  .coaching-status-card:hover {
    transform: translateY(-1px);
    box-shadow: var(--shadow-soft);
  }

  .coaching-status-card h3 {
    margin: 0;
    font-size: 28px;
    font-weight: 800;
  }

  .coaching-status-card span {
    display: block;
    margin-top: 4px;
    color: var(--text-soft);
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
  }

  .coaching-status-card small {
    display: block;
    margin-top: 8px;
    color: var(--text-main);
    font-size: 13px;
    font-weight: 800;
  }

  .coaching-status-card.st-belum { border-left-color: #94a3b8; background: linear-gradient(135deg, rgba(148,163,184,0.10), rgba(255,255,255,0.92)); }
  .coaching-status-card.st-need { border-left-color: #f59e0b; background: linear-gradient(135deg, rgba(245,158,11,0.10), rgba(255,255,255,0.92)); }
