<script>
  let db = { u: {}, achv: [], cair: [], pipeline: [], listCHome: [], listCPipe: [], listS: [] };
  let dbCoaching = { master: [], coaching: [], progress: [] };
  let chartMix = null;
  let pipeFiltered = [];
  let rowLimit = 25;
  let searchTimeout = null;
  let currentSort = { col: 'nama', asc: true };
  let currentPage = 'home';

  const pageOrder = ['home', 'pipe', 'coaching', 'admin'];
  const pageIndexMap = { home: 0, pipe: 1, coaching: 2, admin: 3 };
  const storageKey = 'cc_modular_no_tele_v1';

  function initApp() {
    setDefaultDates();
    setupSwipeNavigation();

    const stored = sessionStorage.getItem(storageKey);
    if (stored) {
      try {
        db = JSON.parse(stored);
        renderUI();
        hideLoader();
        fetchCoachingAddon();
        switchPage('home', true);
        return;
      } catch (e) {
        sessionStorage.removeItem(storageKey);
      }
    }

    fetchDB();
  }

  function setDefaultDates() {
    const today = new Date();
    const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
    const fmt = (d) => {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    };

    ['f-start', 'p-start'].forEach(id => {
      const el = document.getElementById(id);
      if (el && !el.value) el.value = fmt(firstDay);
    });

    ['f-end', 'p-end', 'u-t'].forEach(id => {
      const el = document.getElementById(id);
      if (el && !el.value) el.value = fmt(today);
    });
  }

  function hideLoader() {
    const loader = document.getElementById('loader-global');
    if (loader) loader.style.display = 'none';
  }

  function fetchDB() {
    google.script.run
      .withSuccessHandler(res => {
        db = res || db;
        sessionStorage.setItem(storageKey, JSON.stringify(db));
        renderUI();
        hideLoader();
        fetchCoachingAddon();
        switchPage(currentPage, true);
      })
      .withFailureHandler(err => {
        hideLoader();
        Swal.fire('Error', err && err.message ? err.message : 'Gagal memuat dashboard', 'error');
      })
      .getDashboardData();
  }

  function renderUI() {
    const nameEl = document.getElementById('u-nama');
    if (nameEl && db.u && db.u.nama) nameEl.innerText = db.u.nama;

    const isAdmin = !db.u || !db.u.role || String(db.u.role).toLowerCase() === 'admin';
    const adminNav = document.getElementById('n-admin');
    const adminQuick = document.getElementById('quick-admin-btn');
    if (adminNav) adminNav.style.display = isAdmin ? 'flex' : 'none';
    if (adminQuick) adminQuick.style.display = isAdmin ? 'inline-flex' : 'none';

    fillSelect('f-c', db.listCHome, 'Semua Cabang');
    fillSelect('p-c', db.listCPipe, 'Semua Cabang');
    setPipelineDateRangeFromData();
    syncSalesByBranch();
    runFilter(true);
  }

  function setPipelineDateRangeFromData() {
    const startEl = document.getElementById('p-start');
    const endEl = document.getElementById('p-end');
    if (!startEl || !endEl || !(db.pipeline || []).length) return;

    const dates = (db.pipeline || [])
      .map(r => String(r[0] || '').substring(0, 10))
      .filter(v => /^\d{4}-\d{2}-\d{2}$/.test(v))
      .sort();

    if (!dates.length) return;

    startEl.value = dates[0];
    endEl.value = dates[dates.length - 1];
  }

  function fillSelect(id, list, placeholder) {
    const el = document.getElementById(id);
    if (!el) return;

    el.innerHTML = `<option value="">${escapeHtml(placeholder)}</option>`;
    [...new Set((list || []).filter(Boolean))].sort().forEach(v => {
      el.add(new Option(v, v));
    });
  }

  function syncSalesByBranch() {
    const cab = document.getElementById('p-c');
    const salesSelect = document.getElementById('p-s');
    if (!cab || !salesSelect) return;

    const filteredSales = [...new Set(
      (db.pipeline || [])
        .filter(x => cab.value === '' || x[8] === cab.value)
        .map(x => x[6])
        .filter(Boolean)
    )].sort();

    salesSelect.innerHTML = '<option value="">Semua Sales</option>';
    filteredSales.forEach(s => salesSelect.add(new Option(s, s)));
    filterPipe();
  }

  function runFilter(isBranchChange = false) {
    const s = getValue('f-start') || '1900-01-01';
    const e = getValue('f-end') || '2100-12-31';
    const c = getValue('f-c');
    const n = getValue('f-n');

    if (isBranchChange) {
      const staffSelect = document.getElementById('f-n');
      if (staffSelect) {
        staffSelect.innerHTML = '<option value="">Semua Staff</option>';
        [...new Set(
          (db.achv || [])
            .filter(r => c === '' || r[1] === c)
            .map(r => r[2])
            .filter(Boolean)
        )].sort().forEach(st => staffSelect.add(new Option(st, st)));
      }
    }

    const latestAchv = getLatestAchievementData(db.achv || [], s, e, c, n);
    const filteredCair = (db.cair || []).filter(r =>
      r[0] >= s &&
      r[0] <= e &&
      (c === '' || r[1] === c) &&
      (n === '' || r[2] === n)
    );

    const resA = {
      global: { r: 0, t: 0 },
      cs: { r: 0, t: 0 },
      spv: { r: 0, t: 0 }
    };

    latestAchv.forEach(r => {
      resA.global.r += Number(r[5]) || 0;
      resA.global.t += Number(r[4]) || 0;
      if (resA[r[3]]) {
        resA[r[3]].r += Number(r[5]) || 0;
        resA[r[3]].t += Number(r[4]) || 0;
      }
    });

    setText('g-r', 'Rp ' + resA.global.r.toLocaleString('id-ID'));
    setText('g-t', 'Rp ' + resA.global.t.toLocaleString('id-ID'));

    const pG = resA.global.t > 0 ? ((resA.global.r / resA.global.t) * 100).toFixed(1) : '0.0';
    setText('g-p', pG + '%');

    ['cs', 'spv'].forEach(k => {
      const p = resA[k].t > 0 ? ((resA[k].r / resA[k].t) * 100).toFixed(1) : '0.0';
      setText(k + '-p', p + '%');
      setText(k + '-tgt', 'Rp ' + resA[k].t.toLocaleString('id-ID'));
      setText(k + '-ach', 'Rp ' + resA[k].r.toLocaleString('id-ID'));
    });

    const resC = {};
    let grandItem = 0;
    let grandValue = 0;

    filteredCair.forEach(r => {
      const prod = r[3] || 'LAINNYA';
      if (!resC[prod]) resC[prod] = { q: 0, v: 0 };
      resC[prod].q += Number(r[4]) || 0;
      resC[prod].v += Number(r[5]) || 0;
      grandItem += Number(r[4]) || 0;
      grandValue += Number(r[5]) || 0;
    });

    let h = '';
    Object.keys(resC).sort().forEach(p => {
      h += `
        <div class="cair-row">
          <div>
            <b>${escapeHtml(p)}</b><br>
            <small>${resC[p].q.toLocaleString('id-ID')} Item</small>
          </div>
          <div class="text-end">
            <span class="text-primary fw-bold">Rp ${resC[p].v.toLocaleString('id-ID')}</span>
          </div>
        </div>
      `;
    });

    h += `
      <div class="cair-row total-row">
        <div>
          <b>GRAND TOTAL PENCAIRAN</b><br>
          <small>${grandItem.toLocaleString('id-ID')} Item</small>
        </div>
        <div class="text-end">
          <span class="total-val-gagah">Rp ${grandValue.toLocaleString('id-ID')}</span>
        </div>
      </div>
    `;

    const cairList = document.getElementById('cair-list');
    if (cairList) cairList.innerHTML = h || "<p class='text-center py-5 small text-muted'>Kosong</p>";
    renderHomeChart(Number(pG));
  }

  function getLatestAchievementData(src, startDate, endDate, cabang, staff) {
    const latestMap = {};
    src.forEach(r => {
      const valid =
        r[0] >= startDate &&
        r[0] <= endDate &&
        (cabang === '' || r[1] === cabang) &&
        (staff === '' || r[2] === staff);

      if (!valid) return;

      const key = `${r[1]}__${r[2]}__${r[3] || ''}`;
      if (!latestMap[key] || r[0] > latestMap[key][0]) {
        latestMap[key] = r;
      }
    });

    return Object.values(latestMap);
  }

  function renderHomeChart(percent) {
    const canvas = document.getElementById('gChart');
    if (!canvas) return;

    const ctx = canvas.getContext('2d');
    if (window.myChart) window.myChart.destroy();

    const p = Math.max(0, Math.min(100, Number(percent) || 0));
    window.myChart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        datasets: [{
          data: [p, 100 - p],
          backgroundColor: ['#4cb0ff', 'rgba(255,255,255,0.16)'],
          borderWidth: 0,
          cutout: '80%',
          circumference: 240,
          rotation: 240
        }]
      },
      options: { plugins: { tooltip: { enabled: false } } }
    });
  }

  function filterPipe() {
    const sD = getValue('p-start') || '1900-01-01';
    const eD = getValue('p-end') || '2100-12-31';
    const c = getValue('p-c');
    const sal = getValue('p-s');

    pipeFiltered = (db.pipeline || []).filter(x =>
      x[0] >= sD &&
      x[0] <= eD &&
      (c === '' || x[8] === c) &&
      (sal === '' || x[6] === sal)
    );

    filterTablePipe();
    calculatePipeline();
  }

  function filterTablePipe() {
    const keyword = (getValue('p-search') || '').toLowerCase().trim();
    if (!keyword) {
      renderTablePipe(pipeFiltered);
      return;
    }

    const filtered = pipeFiltered.filter(r => {
      return [r[2], r[3], r[4], r[5], r[6], r[8]]
        .join(' ')
        .toLowerCase()
        .includes(keyword);
    });

    renderTablePipe(filtered);
  }

  function calculatePipeline() {
    const rows = pipeFiltered;
    const metrics = { apk: 0, app: 0, pen: 0, rej: 0, cair: 0, pla: 0, ag: [0, 0, 0, 0] };
    const salesPerf = {};
    const productMix = {};
    const today = new Date().getTime();

    rows.forEach(r => {
      metrics.apk++;
      metrics.pla += Number(r[7]) || 0;

      const st = String(r[3] || '').toUpperCase();
      const kp = String(r[5] || '').toUpperCase();
      const mixVal = String(r[4] || 'LAINNYA').toUpperCase();

      if (kp.includes('APPROVE')) metrics.app++;
      if (kp.includes('PENDING') || st.includes('PENDING')) metrics.pen++;
      if (kp.includes('REJECT')) metrics.rej++;
      if (st === 'CAIR') metrics.cair++;

      productMix[mixVal] = (productMix[mixVal] || 0) + 1;

      const diff = Math.floor((today - (Number(r[1]) || today)) / 86400000);
      if (diff <= 3) metrics.ag[0]++;
      else if (diff <= 7) metrics.ag[1]++;
      else if (diff <= 14) metrics.ag[2]++;
      else metrics.ag[3]++;

      const sales = r[6] || '-';
      if (!salesPerf[sales]) salesPerf[sales] = { p: 0, a: 0 };
      salesPerf[sales].p += Number(r[7]) || 0;
      salesPerf[sales].a++;
    });

    setText('k-pla', 'Rp ' + metrics.pla.toLocaleString('id-ID'));
    setText('k-conv', (metrics.apk > 0 ? ((metrics.app / metrics.apk) * 100).toFixed(1) : '0.0') + '%');
    setText('k-avg', 'Rp ' + (metrics.apk > 0 ? Math.round(metrics.pla / metrics.apk).toLocaleString('id-ID') : '0'));

    setFunnelValue('fn-naik', metrics.apk, metrics.apk);
    setFunnelValue('fn-app', metrics.app, metrics.apk);
    setFunnelValue('fn-pen', metrics.pen, metrics.apk);
    setFunnelValue('fn-rej', metrics.rej, metrics.apk);
    setFunnelValue('fn-cair', metrics.cair, metrics.apk);

    [1, 2, 3, 4].forEach(i => {
      setText('ag-' + i, metrics.ag[i - 1].toLocaleString('id-ID'));
    });

    const sorted = Object.entries(salesPerf).sort((a, b) => b[1].p - a[1].p);
    let topHtml = '';
    sorted.slice(0, 10).forEach((item, i) => {
      topHtml += `<div class="rank-row"><span>${i + 1}. ${escapeHtml(item[0])}</span><b>Rp ${item[1].p.toLocaleString('id-ID')}</b></div>`;
    });

    let botHtml = '';
    [...sorted].sort((a, b) => a[1].p - b[1].p).slice(0, 10).forEach((item, i) => {
      botHtml += `<div class="rank-row bottom-alert"><span>${i + 1}. ${escapeHtml(item[0])}</span><b>${item[1].a} Apk</b></div>`;
    });

    const top = document.getElementById('top-sales-list');
    const bot = document.getElementById('bot-sales-list');
    const emptyMessage = rows.length
      ? '<div class="empty-state">Belum ada peringkat sales</div>'
      : '<div class="empty-state">Tidak ada data pada filter ini. Cek tanggal, cabang, atau sales.</div>';
    if (top) top.innerHTML = topHtml || emptyMessage;
    if (bot) bot.innerHTML = botHtml || emptyMessage;

    renderPipelineMixChart(productMix);
  }

  function setFunnelValue(id, value, total) {
    const countEl = document.getElementById(id);
    const pctEl = document.getElementById(id + '-p');

    const pct = total > 0 ? ((Number(value) || 0) / total * 100).toFixed(1) : '0.0';
    if (countEl) countEl.innerText = (Number(value) || 0).toLocaleString('id-ID');
    if (pctEl) pctEl.innerText = pct + '%';
  }

  function renderPipelineMixChart(productMix) {
    const canvas = document.getElementById('pChartMix');
    if (!canvas) return;

    const labels = Object.keys(productMix);
    const values = Object.values(productMix);
    const ctx = canvas.getContext('2d');

    if (chartMix) chartMix.destroy();

    chartMix = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: labels.length ? labels : ['Belum Ada Data'],
        datasets: [{
          data: values.length ? values : [1],
          backgroundColor: labels.length
            ? ['#0f3d75', '#0f8c95', '#7a4ff3', '#de7a16', '#1c8d54', '#dc3545', '#ffc658']
            : ['#CBD5E1'],
          borderWidth: 0
        }]
      },
      options: {
        plugins: {
          legend: {
            position: 'bottom',
            labels: { boxWidth: 10, font: { size: 10 } }
          }
        },
        cutout: '64%'
      }
    });
  }

  function renderTablePipe(data) {
    let h = '';
    data.slice(0, rowLimit).forEach(r => {
      const status = String(r[3] || '');
      const keputusan = String(r[5] || '');
      const sc = status.toUpperCase().includes('APK')
        ? 'st-apk'
        : (status.toUpperCase() === 'CAIR' ? 'st-cair' : 'st-app');
      const kc = keputusan.toUpperCase().includes('REJECT')
        ? 'st-rej'
        : (keputusan.toUpperCase().includes('APPROVE') ? 'st-app' : 'st-apk');

      h += `
        <tr>
          <td><b>${escapeHtml(r[2] || '-')}</b></td>
          <td><small>${escapeHtml(r[6] || '-')}</small></td>
          <td><span class="badge-status ${sc}">${escapeHtml(status || '-')}</span></td>
          <td><span class="badge-status ${kc}">${escapeHtml(keputusan || '-')}</span></td>
          <td class="fw-bold">Rp ${(Number(r[7]) || 0).toLocaleString('id-ID')}</td>
        </tr>
      `;
    });

    const body = document.getElementById('pipe-body');
    if (body) {
      body.innerHTML = h || "<tr><td colspan='5' class='empty-state'>Tidak ada data pipeline pada filter ini.</td></tr>";
    }
    setText('p-info', `${data.length} Data Terfilter`);
  }

  function switchPage(page, forceMove = false) {
    currentPage = pageIndexMap[page] === undefined ? 'home' : page;
    updatePageTransform(forceMove);
    updateActiveNavigation(currentPage);
  }

  function updatePageTransform() {
    const track = document.getElementById('page-track');
    if (track) {
      track.style.transition = 'none';
      track.style.transform = 'none';
    }

    pageOrder.forEach(page => {
      const panel = document.getElementById('panel-' + page);
      if (panel) {
        const isActive = page === currentPage;
        panel.style.display = isActive ? 'block' : 'none';
        panel.classList.toggle('active', isActive);
      }
    });

    updateHeaderSubtitle();
  }

  function updateActiveNavigation(page) {
    const navMap = {
      home: 'n-home',
      pipe: 'n-pipe',
      coaching: 'n-coaching',
      admin: 'n-admin'
    };

    Object.values(navMap).forEach(id => {
      const el = document.getElementById(id);
      if (el) el.classList.remove('active');
    });

    document.querySelectorAll('.quick-tab').forEach(el => el.classList.remove('active'));

    const nav = document.getElementById(navMap[page]);
    if (nav) nav.classList.add('active');

    const quickMap = {
      home: '.quick-home',
      pipe: '.quick-pipe',
      coaching: '.quick-coaching',
      admin: '.quick-admin'
    };

    const quick = document.querySelector(quickMap[page]);
    if (quick) quick.classList.add('active');
  }

  function updateHeaderSubtitle() {
    const map = {
      home: 'Ringkasan performa, achievement, dan pencairan',
      pipe: 'Monitoring funnel, aging, dan kualitas pipeline',
      coaching: 'Pendampingan staff dan tindak lanjut coaching',
      admin: 'Pusat unggah data dan kontrol pembaruan dashboard'
    };

    setText('header-subtitle', map[currentPage] || '');
  }

  function setupSwipeNavigation() {
    // Disabled intentionally: Apps Script web app containers can render 100vw slide tracks
    // inconsistently on desktop. Navigation remains stable through header and bottom tabs.
  }

  function refreshData() {
    sessionStorage.removeItem(storageKey);
    const loader = document.getElementById('loader-global');
    if (loader) loader.style.display = 'flex';
    fetchDB();
  }

  function execU() {
    const dateVal = getValue('u-t');
    const tipe = getValue('u-j');
    const fileInput = document.getElementById('u-f');
    const file = fileInput && fileInput.files ? fileInput.files[0] : null;

    if (!dateVal) {
      Swal.fire('Error', 'Tanggal data wajib diisi.', 'error');
      return;
    }

    if (!file) {
      Swal.fire('Error', 'Pilih file Excel terlebih dahulu.', 'error');
      return;
    }

    Swal.fire({
      title: 'Memproses file...',
      text: 'Mohon tunggu sebentar',
      allowOutsideClick: false,
      didOpen: () => Swal.showLoading()
    });

    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const data = new Uint8Array(e.target.result);
        const wb = XLSX.read(data, { type: 'array' });
        const sheetName = wb.SheetNames[0];
        const ws = wb.Sheets[sheetName];
        const rows = XLSX.utils.sheet_to_json(ws, { header: 1, raw: false });

        google.script.run
          .withSuccessHandler(msg => {
            Swal.fire('Selesai', msg || 'Upload berhasil', 'success');
            fileInput.value = '';
            refreshData();
          })
          .withFailureHandler(err => {
            Swal.fire('Error', err && err.message ? err.message : 'Upload gagal', 'error');
          })
          .processExcelData(rows, dateVal, tipe);
      } catch (err) {
        Swal.fire('Error', err.message || 'Gagal membaca file', 'error');
      }
    };

    reader.onerror = function() {
      Swal.fire('Error', 'Gagal membaca file lokal.', 'error');
    };

    reader.readAsArrayBuffer(file);
  }

  function fetchCoachingAddon() {
    google.script.run
      .withSuccessHandler(res => {
        dbCoaching = res || { master: [], coaching: [], progress: [] };
        renderCoachingInteractiveTable();
      })
      .withFailureHandler(err => {
        console.error(err);
      })
      .getCoachingFullData();
  }

  function renderCoachingInteractiveTable() {
    const body = document.getElementById('coaching-table-body');
    if (!body) return;

    const master = dbCoaching.master || [];
    if (master.length < 2) {
      body.innerHTML = "<tr><td colspan='5' class='empty-state'>Data Master_Karyawan belum tersedia.</td></tr>";
      return;
    }

    const list = [];
    master.slice(1).forEach(m => {
      const nama = String(m[2] || '').trim();
      if (!nama) return;

      const coachData = (dbCoaching.coaching || [])
        .slice(1)
        .filter(c => String(c[3] || '').trim() === nama)
        .sort((a, b) => new Date(b[1]) - new Date(a[1]));

      list.push({
        nik: String(m[1] || '').trim(),
        nama,
        jab: String(m[3] || '').trim(),
        cab: String(m[4] || '').trim(),
        status: coachData.length > 0 ? String(coachData[0][7] || 'ONGOING') : 'BELUM COACHING',
        lastId: coachData.length > 0 ? String(coachData[0][0] || '') : ''
      });
    });

    window.dataTabelCoaching = list;
    sortCoachingInteractive(currentSort.col || 'nama', true);
  }

  function sortCoachingInteractive(col, keepDirection) {
    const data = window.dataTabelCoaching;
    if (!data) return;

    if (keepDirection !== true) {
      if (currentSort.col === col) currentSort.asc = !currentSort.asc;
      else {
        currentSort.col = col;
        currentSort.asc = true;
      }
    } else {
      currentSort.col = col;
    }

    data.sort((a, b) => {
      const vA = String(a[col] || '').toLowerCase();
      const vB = String(b[col] || '').toLowerCase();
      if (vA < vB) return currentSort.asc ? -1 : 1;
      if (vA > vB) return currentSort.asc ? 1 : -1;
      return 0;
    });

    const h = data.map(r => `
      <tr onclick="handleRowClickCoaching(${toJsString(r.nama)}, ${toJsString(r.cab)}, ${toJsString(r.lastId)})">
        <td>${escapeHtml(r.nik)}</td>
        <td><b>${escapeHtml(r.nama)}</b></td>
        <td>${escapeHtml(r.cab)}</td>
        <td>${escapeHtml(r.jab)}</td>
        <td><span class="badge ${r.status === 'BELUM COACHING' ? 'bg-secondary' : 'bg-warning text-dark'}">${escapeHtml(r.status)}</span></td>
      </tr>
    `).join('');

    const body = document.getElementById('coaching-table-body');
    if (body) body.innerHTML = h || "<tr><td colspan='5' class='empty-state'>Belum ada data coaching.</td></tr>";
  }

  function handleRowClickCoaching(nama, cab, lastId) {
    setValue('c-staff', nama || '');
    setValue('c-cabang', cab || '');
    setValue('c-parent-id', lastId || '');

    if (lastId) {
      Swal.fire({
        icon: 'info',
        title: 'Follow Up Coaching',
        text: 'Karyawan sudah memiliki data coaching. Input ini akan disimpan sebagai tindak lanjut.'
      });
    }

    switchPage('coaching', true);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function saveCoachingInteractive() {
    const obj = {
      cabang: getValue('c-cabang'),
      staff: getValue('c-staff'),
      root: getValue('c-root'),
      topic: getValue('c-topic'),
      target: getValue('c-target'),
      parentId: getValue('c-parent-id'),
      bm: getValue('c-bm'),
      region: getValue('c-region'),
      lastPerf: getValue('c-perf')
    };

    if (!obj.staff || !obj.root) {
      Swal.fire('Error', 'Pilih karyawan dan isi root cause.', 'error');
      return;
    }

    Swal.fire({
      title: 'Menyimpan...',
      allowOutsideClick: false,
      didOpen: () => Swal.showLoading()
    });

    google.script.run
      .withSuccessHandler(() => {
        Swal.fire('Sukses', 'Data Coaching / Follow-Up tersimpan.', 'success');
        clearCoachingForm();
        fetchCoachingAddon();
      })
      .withFailureHandler(err => {
        Swal.fire('Error', err && err.message ? err.message : 'Gagal menyimpan coaching', 'error');
      })
      .saveCoachingAction(obj);
  }

  function clearCoachingForm() {
    ['c-staff', 'c-cabang', 'c-root', 'c-topic', 'c-target', 'c-parent-id', 'c-bm', 'c-region', 'c-perf']
      .forEach(id => setValue(id, ''));
  }

  function debounceSearch() {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => filterTablePipe(), 200);
  }

  function getValue(id) {
    const el = document.getElementById(id);
    return el ? el.value : '';
  }

  function setValue(id, value) {
    const el = document.getElementById(id);
    if (el) el.value = value;
  }

  function setText(id, value) {
    const el = document.getElementById(id);
    if (el) el.innerText = value;
  }

  function escapeHtml(value) {
    return String(value || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function toJsString(value) {
    return JSON.stringify(String(value || ''));
  }
</script>
