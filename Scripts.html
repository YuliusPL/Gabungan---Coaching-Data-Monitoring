<script>
  let db = { u: {}, achv: [], cair: [], pipeline: [], listCHome: [], listCPipe: [], listS: [] };
  let dbCoaching = { master: [], coaching: [], progress: [] };
  let chartMix = null;
  let pipeFiltered = [];
  let rowLimit = 25;
  let searchTimeout = null;
  let currentSort = { col: 'nama', asc: true };
  let pipeSort = { col: 'debitur', asc: true };
  let coachingRows = [];
  let selectedCoachingStaffKey = '';
  let coachingLastFocus = { region: '', cabang: '', status: 'BELUM COACHING', staffKey: '' };
  let coachingFilter = { level: 'all', region: '', cabang: '', status: 'BELUM COACHING' };
  const coachingRegionBuckets = ['REGION 1', 'REGION 2', 'REGION 3', 'REGION 4', 'LAINNYA'];
  let currentPage = 'home';

  const pageOrder = ['home', 'pipe', 'coaching', 'admin'];
  const pageIndexMap = { home: 0, pipe: 1, coaching: 2, admin: 3 };
  const storageKey = 'cc_modular_no_tele_v1';

  function initApp() {
    setDefaultDates();
    setupSwipeNavigation();

    const stored = sessionStorage.getItem(storageKey);
    if (stored) {
      try {
        db = JSON.parse(stored);
        renderUI();
        hideLoader();
        fetchCoachingAddon();
        switchPage('home', true);
        return;
      } catch (e) {
        sessionStorage.removeItem(storageKey);
      }
    }

    fetchDB();
  }

  function setDefaultDates() {
    const today = new Date();
    const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
    const fmt = (d) => {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    };

    ['f-start', 'p-start'].forEach(id => {
      const el = document.getElementById(id);
      if (el && !el.value) el.value = fmt(firstDay);
    });

    ['f-end', 'p-end', 'u-t'].forEach(id => {
      const el = document.getElementById(id);
      if (el && !el.value) el.value = fmt(today);
    });
  }

  function hideLoader() {
    const loader = document.getElementById('loader-global');
    if (loader) loader.style.display = 'none';
  }

  function fetchDB() {
    google.script.run
      .withSuccessHandler(res => {
        db = res || db;
        sessionStorage.setItem(storageKey, JSON.stringify(db));
        renderUI();
        hideLoader();
        fetchCoachingAddon();
        switchPage(currentPage, true);
      })
      .withFailureHandler(err => {
        hideLoader();
        Swal.fire('Error', err && err.message ? err.message : 'Gagal memuat dashboard', 'error');
      })
      .getDashboardData();
  }

  function renderUI() {
    const nameEl = document.getElementById('u-nama');
    if (nameEl && db.u && db.u.nama) nameEl.innerText = db.u.nama;

    const isAdmin = !db.u || !db.u.role || String(db.u.role).toLowerCase() === 'admin';
    const adminNav = document.getElementById('n-admin');
    const adminQuick = document.getElementById('quick-admin-btn');
    if (adminNav) adminNav.style.display = isAdmin ? 'flex' : 'none';
    if (adminQuick) adminQuick.style.display = isAdmin ? 'inline-flex' : 'none';

    fillSelect('f-c', db.listCHome, 'Semua Cabang');
    fillSelect('p-c', db.listCPipe, 'Semua Cabang');
    setPipelineDateRangeFromData();
    syncSalesByBranch();
    runFilter(true);
  }

  function setPipelineDateRangeFromData() {
    const startEl = document.getElementById('p-start');
    const endEl = document.getElementById('p-end');
    if (!startEl || !endEl || !(db.pipeline || []).length) return;

    const dates = (db.pipeline || [])
      .map(r => String(r[0] || '').substring(0, 10))
      .filter(v => /^\d{4}-\d{2}-\d{2}$/.test(v))
      .sort();

    if (!dates.length) return;

    startEl.value = dates[0];
    endEl.value = dates[dates.length - 1];
  }

  function fillSelect(id, list, placeholder) {
    const el = document.getElementById(id);
    if (!el) return;

    el.innerHTML = `<option value="">${escapeHtml(placeholder)}</option>`;
    [...new Set((list || []).filter(Boolean))].sort().forEach(v => {
      el.add(new Option(v, v));
    });
  }

  function syncSalesByBranch() {
    const cab = document.getElementById('p-c');
    const salesSelect = document.getElementById('p-s');
    if (!cab || !salesSelect) return;

    const filteredSales = [...new Set(
      (db.pipeline || [])
        .filter(x => cab.value === '' || x[8] === cab.value)
        .map(x => x[6])
        .filter(Boolean)
    )].sort();

    salesSelect.innerHTML = '<option value="">Semua Sales</option>';
    filteredSales.forEach(s => salesSelect.add(new Option(s, s)));
    filterPipe();
  }

  function runFilter(isBranchChange = false) {
    const s = getValue('f-start') || '1900-01-01';
    const e = getValue('f-end') || '2100-12-31';
    const c = getValue('f-c');
    const n = getValue('f-n');

    if (isBranchChange) {
      const staffSelect = document.getElementById('f-n');
      if (staffSelect) {
        staffSelect.innerHTML = '<option value="">Semua Staff</option>';
        [...new Set(
          (db.achv || [])
            .filter(r => c === '' || r[1] === c)
            .map(r => r[2])
            .filter(Boolean)
        )].sort().forEach(st => staffSelect.add(new Option(st, st)));
      }
    }

    const latestAchv = getLatestAchievementData(db.achv || [], s, e, c, n);
    const filteredCair = (db.cair || []).filter(r =>
      r[0] >= s &&
      r[0] <= e &&
      (c === '' || r[1] === c) &&
      (n === '' || r[2] === n)
    );

    const resA = {
      global: { r: 0, t: 0 },
      cs: { r: 0, t: 0 },
      spv: { r: 0, t: 0 }
    };

    latestAchv.forEach(r => {
      resA.global.r += Number(r[5]) || 0;
      resA.global.t += Number(r[4]) || 0;
      if (resA[r[3]]) {
        resA[r[3]].r += Number(r[5]) || 0;
        resA[r[3]].t += Number(r[4]) || 0;
      }
    });

    setText('g-r', 'Rp ' + resA.global.r.toLocaleString('id-ID'));
    setText('g-t', 'Rp ' + resA.global.t.toLocaleString('id-ID'));

    const pG = resA.global.t > 0 ? ((resA.global.r / resA.global.t) * 100).toFixed(1) : '0.0';
    setText('g-p', pG + '%');

    ['cs', 'spv'].forEach(k => {
      const p = resA[k].t > 0 ? ((resA[k].r / resA[k].t) * 100).toFixed(1) : '0.0';
      setText(k + '-p', p + '%');
      setText(k + '-tgt', 'Rp ' + resA[k].t.toLocaleString('id-ID'));
      setText(k + '-ach', 'Rp ' + resA[k].r.toLocaleString('id-ID'));
    });

    const resC = {};
    let grandItem = 0;
    let grandValue = 0;

    filteredCair.forEach(r => {
      const prod = r[3] || 'LAINNYA';
      if (!resC[prod]) resC[prod] = { q: 0, v: 0 };
      resC[prod].q += Number(r[4]) || 0;
      resC[prod].v += Number(r[5]) || 0;
      grandItem += Number(r[4]) || 0;
      grandValue += Number(r[5]) || 0;
    });

    let h = '';
    Object.keys(resC).sort().forEach(p => {
      h += `
        <div class="cair-row">
          <div>
            <b>${escapeHtml(p)}</b><br>
            <small>${resC[p].q.toLocaleString('id-ID')} Item</small>
          </div>
          <div class="text-end">
            <span class="text-primary fw-bold">Rp ${resC[p].v.toLocaleString('id-ID')}</span>
          </div>
        </div>
      `;
    });

    h += `
      <div class="cair-row total-row">
        <div>
          <b>GRAND TOTAL PENCAIRAN</b><br>
          <small>${grandItem.toLocaleString('id-ID')} Item</small>
        </div>
        <div class="text-end">
          <span class="total-val-gagah">Rp ${grandValue.toLocaleString('id-ID')}</span>
        </div>
      </div>
    `;

    const cairList = document.getElementById('cair-list');
    if (cairList) cairList.innerHTML = h || "<p class='text-center py-5 small text-muted'>Kosong</p>";
    renderHomeChart(Number(pG));
  }

  function getLatestAchievementData(src, startDate, endDate, cabang, staff) {
    const latestMap = {};
    src.forEach(r => {
      const valid =
        r[0] >= startDate &&
        r[0] <= endDate &&
        (cabang === '' || r[1] === cabang) &&
        (staff === '' || r[2] === staff);

      if (!valid) return;

      const key = `${r[1]}__${r[2]}__${r[3] || ''}`;
      if (!latestMap[key] || r[0] > latestMap[key][0]) {
        latestMap[key] = r;
      }
    });

    return Object.values(latestMap);
  }

  function renderHomeChart(percent) {
    const canvas = document.getElementById('gChart');
    if (!canvas) return;

    const ctx = canvas.getContext('2d');
    if (window.myChart) window.myChart.destroy();

    const p = Math.max(0, Math.min(100, Number(percent) || 0));
    window.myChart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        datasets: [{
          data: [p, 100 - p],
          backgroundColor: ['#4cb0ff', 'rgba(255,255,255,0.16)'],
          borderWidth: 0,
          cutout: '80%',
          circumference: 240,
          rotation: 240
        }]
      },
      options: { plugins: { tooltip: { enabled: false } } }
    });
  }

  function filterPipe() {
    const sD = getValue('p-start') || '1900-01-01';
    const eD = getValue('p-end') || '2100-12-31';
    const c = getValue('p-c');
    const sal = getValue('p-s');

    pipeFiltered = (db.pipeline || []).filter(x =>
      x[0] >= sD &&
      x[0] <= eD &&
      (c === '' || x[8] === c) &&
      (sal === '' || x[6] === sal)
    );

    filterTablePipe();
    calculatePipeline();
  }

  function filterTablePipe() {
    const keyword = (getValue('p-search') || '').toLowerCase().trim();
    if (!keyword) {
      renderTablePipe(sortPipeRows(pipeFiltered));
      return;
    }

    const filtered = pipeFiltered.filter(r => {
      return [r[2], r[3], r[4], r[5], r[6], r[8]]
        .join(' ')
        .toLowerCase()
        .includes(keyword);
    });

    renderTablePipe(sortPipeRows(filtered));
  }

  function sortPipeTable(col) {
    if (pipeSort.col === col) {
      pipeSort.asc = !pipeSort.asc;
    } else {
      pipeSort.col = col;
      pipeSort.asc = true;
    }

    filterTablePipe();
    updatePipeSortIndicators();
  }

  function sortPipeRows(rows) {
    const indexMap = {
      debitur: 2,
      sales: 6,
      status: 3,
      keputusan: 5,
      plafond: 7
    };

    const idx = indexMap[pipeSort.col];
    const sorted = [...(rows || [])];

    sorted.sort((a, b) => {
      let vA = a[idx];
      let vB = b[idx];

      if (pipeSort.col === 'plafond') {
        vA = Number(vA) || 0;
        vB = Number(vB) || 0;
        return pipeSort.asc ? vA - vB : vB - vA;
      }

      vA = String(vA || '').toLowerCase();
      vB = String(vB || '').toLowerCase();

      if (vA < vB) return pipeSort.asc ? -1 : 1;
      if (vA > vB) return pipeSort.asc ? 1 : -1;
      return 0;
    });

    return sorted;
  }

  function updatePipeSortIndicators() {
    ['debitur', 'sales', 'status', 'keputusan', 'plafond'].forEach(col => {
      const el = document.getElementById('sort-' + col);
      if (!el) return;
      el.innerText = pipeSort.col === col ? (pipeSort.asc ? '▲' : '▼') : '↕';
    });
  }

  function calculatePipeline() {
    const rows = pipeFiltered;
    const metrics = { apk: 0, app: 0, pen: 0, rej: 0, cair: 0, pla: 0, ag: [0, 0, 0, 0] };
    const salesPerf = {};
    const productMix = {};
    const today = new Date().getTime();

    rows.forEach(r => {
      metrics.apk++;
      metrics.pla += Number(r[7]) || 0;

      const st = String(r[3] || '').toUpperCase();
      const kp = String(r[5] || '').toUpperCase();
      const mixVal = String(r[4] || 'LAINNYA').toUpperCase();

      if (kp.includes('APPROVE')) metrics.app++;
      if (kp.includes('PENDING') || st.includes('PENDING')) metrics.pen++;
      if (kp.includes('REJECT')) metrics.rej++;
      if (st === 'CAIR') metrics.cair++;

      productMix[mixVal] = (productMix[mixVal] || 0) + 1;

      const diff = Math.floor((today - (Number(r[1]) || today)) / 86400000);
      if (diff <= 3) metrics.ag[0]++;
      else if (diff <= 7) metrics.ag[1]++;
      else if (diff <= 14) metrics.ag[2]++;
      else metrics.ag[3]++;

      const sales = r[6] || '-';
      if (!salesPerf[sales]) salesPerf[sales] = { p: 0, a: 0 };
      salesPerf[sales].p += Number(r[7]) || 0;
      salesPerf[sales].a++;
    });

    setText('k-pla', 'Rp ' + metrics.pla.toLocaleString('id-ID'));
    setText('k-conv', (metrics.apk > 0 ? ((metrics.app / metrics.apk) * 100).toFixed(1) : '0.0') + '%');
    setText('k-avg', 'Rp ' + (metrics.apk > 0 ? Math.round(metrics.pla / metrics.apk).toLocaleString('id-ID') : '0'));

    setText('fn-naik', metrics.apk.toLocaleString('id-ID'));
    setFunnelValue('fn-app', metrics.app, metrics.apk);
    setFunnelValue('fn-pen', metrics.pen, metrics.apk);
    setFunnelValue('fn-rej', metrics.rej, metrics.apk);
    setFunnelValue('fn-cair', metrics.cair, metrics.apk);
    ensurePipelineFunnelStructure();

    [1, 2, 3, 4].forEach(i => {
      setText('ag-' + i, metrics.ag[i - 1].toLocaleString('id-ID'));
    });

    const sorted = Object.entries(salesPerf).sort((a, b) => b[1].p - a[1].p);
    let topHtml = '';
    sorted.slice(0, 10).forEach((item, i) => {
      topHtml += `<div class="rank-row"><span>${i + 1}. ${escapeHtml(item[0])}</span><b>Rp ${item[1].p.toLocaleString('id-ID')}</b></div>`;
    });

    let botHtml = '';
    [...sorted].sort((a, b) => a[1].p - b[1].p).slice(0, 10).forEach((item, i) => {
      botHtml += `<div class="rank-row bottom-alert"><span>${i + 1}. ${escapeHtml(item[0])}</span><b>${item[1].a} Apk</b></div>`;
    });

    const top = document.getElementById('top-sales-list');
    const bot = document.getElementById('bot-sales-list');
    const emptyMessage = rows.length
      ? '<div class="empty-state">Belum ada peringkat sales</div>'
      : '<div class="empty-state">Tidak ada data pada filter ini. Cek tanggal, cabang, atau sales.</div>';
    if (top) top.innerHTML = topHtml || emptyMessage;
    if (bot) bot.innerHTML = botHtml || emptyMessage;

    renderPipelineMixChart(productMix);
  }

  function ensurePipelineFunnelStructure() {
    ['fn-app', 'fn-pen', 'fn-rej', 'fn-cair'].forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      const countEl = el.querySelector('.funnel-count');
      const pctEl = el.querySelector('.funnel-pct');
      if (!countEl || !pctEl) {
        console.warn('Pipeline funnel structure repaired for:', id);
        el.innerHTML = '<b class="funnel-count">0</b><small class="funnel-pct">0%</small>';
      }
    });
  }

  function setFunnelValue(id, value, total) {
    const el = document.getElementById(id);
    if (!el) return;

    const safeValue = Number(value) || 0;
    const safeTotal = Number(total) || 0;
    const pct = safeTotal > 0 ? ((safeValue / safeTotal) * 100).toFixed(1) : '0.0';
    let countEl = el.querySelector('.funnel-count');
    let pctEl = el.querySelector('.funnel-pct');

    // Self-healing guard: if markup changes or gets replaced, rebuild stable funnel nodes.
    if (!countEl || !pctEl) {
      el.innerHTML = '<b class="funnel-count">0</b><small class="funnel-pct">0%</small>';
      countEl = el.querySelector('.funnel-count');
      pctEl = el.querySelector('.funnel-pct');
    }

    if (countEl) countEl.innerText = safeValue.toLocaleString('id-ID');
    if (pctEl) pctEl.innerText = pct + '%';
  }

  function renderPipelineMixChart(productMix) {
    const canvas = document.getElementById('pChartMix');
    if (!canvas) return;

    const labels = Object.keys(productMix);
    const values = Object.values(productMix);
    const ctx = canvas.getContext('2d');

    if (chartMix) chartMix.destroy();

    chartMix = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: labels.length ? labels : ['Belum Ada Data'],
        datasets: [{
          data: values.length ? values : [1],
          backgroundColor: labels.length
            ? ['#0f3d75', '#0f8c95', '#7a4ff3', '#de7a16', '#1c8d54', '#dc3545', '#ffc658']
            : ['#CBD5E1'],
          borderWidth: 0
        }]
      },
      options: {
        plugins: {
          legend: {
            position: 'bottom',
            labels: { boxWidth: 10, font: { size: 10 } }
          }
        },
        cutout: '64%'
      }
    });
  }

  function renderTablePipe(data) {
    let h = '';
    data.slice(0, rowLimit).forEach(r => {
      const status = String(r[3] || '');
      const keputusan = String(r[5] || '');
      const sc = status.toUpperCase().includes('APK')
        ? 'st-apk'
        : (status.toUpperCase() === 'CAIR' ? 'st-cair' : 'st-app');
      const kc = keputusan.toUpperCase().includes('REJECT')
        ? 'st-rej'
        : (keputusan.toUpperCase().includes('APPROVE') ? 'st-app' : 'st-apk');

      h += `
        <tr>
          <td><b>${escapeHtml(r[2] || '-')}</b></td>
          <td><small>${escapeHtml(r[6] || '-')}</small></td>
          <td><span class="badge-status ${sc}">${escapeHtml(status || '-')}</span></td>
          <td><span class="badge-status ${kc}">${escapeHtml(keputusan || '-')}</span></td>
          <td class="fw-bold">Rp ${(Number(r[7]) || 0).toLocaleString('id-ID')}</td>
        </tr>
      `;
    });

    const body = document.getElementById('pipe-body');
    if (body) {
      body.innerHTML = h || "<tr><td colspan='5' class='empty-state'>Tidak ada data pipeline pada filter ini.</td></tr>";
    }
    setText('p-info', `${data.length} Data Terfilter`);
    updatePipeSortIndicators();
  }

  function switchPage(page, forceMove = false) {
    currentPage = pageIndexMap[page] === undefined ? 'home' : page;
    updatePageTransform(forceMove);
    updateActiveNavigation(currentPage);
  }

  function updatePageTransform() {
    const track = document.getElementById('page-track');
    if (track) {
      track.style.transition = 'none';
      track.style.transform = 'none';
    }

    pageOrder.forEach(page => {
      const panel = document.getElementById('panel-' + page);
      if (panel) {
        const isActive = page === currentPage;
        panel.style.display = isActive ? 'block' : 'none';
        panel.classList.toggle('active', isActive);
      }
    });

    updateHeaderSubtitle();
  }

  function updateActiveNavigation(page) {
    const navMap = {
      home: 'n-home',
      pipe: 'n-pipe',
      coaching: 'n-coaching',
      admin: 'n-admin'
    };

    Object.values(navMap).forEach(id => {
      const el = document.getElementById(id);
      if (el) el.classList.remove('active');
    });

    document.querySelectorAll('.quick-tab').forEach(el => el.classList.remove('active'));

    const nav = document.getElementById(navMap[page]);
    if (nav) nav.classList.add('active');

    const quickMap = {
      home: '.quick-home',
      pipe: '.quick-pipe',
      coaching: '.quick-coaching',
      admin: '.quick-admin'
    };

    const quick = document.querySelector(quickMap[page]);
    if (quick) quick.classList.add('active');
  }

  function updateHeaderSubtitle() {
    const map = {
      home: 'Ringkasan performa, achievement, dan pencairan',
      pipe: 'Monitoring funnel, aging, dan kualitas pipeline',
      coaching: 'Pendampingan staff dan tindak lanjut coaching',
      admin: 'Pusat unggah data dan kontrol pembaruan dashboard'
    };

    setText('header-subtitle', map[currentPage] || '');
  }

  function setupSwipeNavigation() {
    // Disabled intentionally: Apps Script web app containers can render 100vw slide tracks
    // inconsistently on desktop. Navigation remains stable through header and bottom tabs.
  }

  function refreshData() {
    sessionStorage.removeItem(storageKey);
    const loader = document.getElementById('loader-global');
    if (loader) loader.style.display = 'flex';
    fetchDB();
  }

  function execU() {
    const dateVal = getValue('u-t');
    const tipe = getValue('u-j');
    const fileInput = document.getElementById('u-f');
    const file = fileInput && fileInput.files ? fileInput.files[0] : null;

    if (!dateVal) {
      Swal.fire('Error', 'Tanggal data wajib diisi.', 'error');
      return;
    }

    if (!file) {
      Swal.fire('Error', 'Pilih file Excel terlebih dahulu.', 'error');
      return;
    }

    Swal.fire({
      title: 'Memproses file...',
      text: 'Mohon tunggu sebentar',
      allowOutsideClick: false,
      didOpen: () => Swal.showLoading()
    });

    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const data = new Uint8Array(e.target.result);
        const wb = XLSX.read(data, { type: 'array' });
        const sheetName = wb.SheetNames[0];
        const ws = wb.Sheets[sheetName];
        const rows = XLSX.utils.sheet_to_json(ws, { header: 1, raw: false });

        google.script.run
          .withSuccessHandler(msg => {
            Swal.fire('Selesai', msg || 'Upload berhasil', 'success');
            fileInput.value = '';
            refreshData();
          })
          .withFailureHandler(err => {
            Swal.fire('Error', err && err.message ? err.message : 'Upload gagal', 'error');
          })
          .processExcelData(rows, dateVal, tipe);
      } catch (err) {
        Swal.fire('Error', err.message || 'Gagal membaca file', 'error');
      }
    };

    reader.onerror = function() {
      Swal.fire('Error', 'Gagal membaca file lokal.', 'error');
    };

    reader.readAsArrayBuffer(file);
  }

  function fetchCoachingAddon() {
    google.script.run
      .withSuccessHandler(res => {
        dbCoaching = res || { master: [], coaching: [], progress: [] };
        renderCoachingInteractiveTable();
      })
      .withFailureHandler(err => {
        console.error(err);
      })
      .getCoachingFullData();
  }

  function getHeaderIndex(headers, candidates, fallback) {
    const normalized = (headers || []).map(h => String(h || '').toLowerCase().trim());
    for (let i = 0; i < normalized.length; i++) {
      const label = normalized[i];
      if (!label) continue;
      const found = candidates.some(c => label.includes(String(c).toLowerCase()));
      if (found) return i;
    }
    return fallback;
  }

  function renderCoachingInteractiveTable() {
    const body = document.getElementById('coaching-table-body');
    if (!body) return;

    const master = dbCoaching.master || [];
    if (master.length < 2) {
      body.innerHTML = "<tr><td colspan='5' class='empty-state'>Data Master_Karyawan belum tersedia.</td></tr>";
      return;
    }

    coachingRows = buildCoachingRows();
    window.dataTabelCoaching = coachingRows;
    applyCoachingLastFocus();
    renderCoachingDashboard();
    sortCoachingInteractive(currentSort.col || 'nama', true);
  }

  function applyCoachingLastFocus() {
    if (!coachingLastFocus) return;
    if (coachingLastFocus.status) coachingFilter.status = coachingLastFocus.status;
    if (coachingLastFocus.region) coachingFilter.region = coachingLastFocus.region;
    if (coachingLastFocus.cabang) coachingFilter.cabang = coachingLastFocus.cabang;
    if (coachingLastFocus.staffKey) selectedCoachingStaffKey = coachingLastFocus.staffKey;
  }

  function buildCoachingRows() {
    const master = dbCoaching.master || [];
    const headers = master[0] || [];
    const idxNik = getHeaderIndex(headers, ['nik'], 1);
    const idxNama = getHeaderIndex(headers, ['nama karyawan', 'nama'], 2);
    const idxJab = getHeaderIndex(headers, ['jabatan'], 3);
    const idxRegion = getHeaderIndex(headers, ['region', 'divisi', 'departemen'], 4);
    const idxCab = getHeaderIndex(headers, ['cabang', 'lokasi'], 5);
    const idxRole = getHeaderIndex(headers, ['role user', 'role'], 6);

    const rows = [];
    master.slice(1).forEach(m => {
      const nama = String(m[idxNama] || '').trim();
      if (!nama) return;

      const coachData = (dbCoaching.coaching || [])
        .slice(1)
        .filter(c => String(c[3] || '').trim() === nama)
        .sort((a, b) => new Date(b[1]) - new Date(a[1]));

      const latest = coachData[0] || null;
      const status = getCoachingStatus(latest);

      rows.push({
        nik: String(m[idxNik] || '').trim(),
        nama,
        jab: String(m[idxJab] || '').trim(),
        region: String(m[idxRegion] || 'REGION LAINNYA').trim() || 'REGION LAINNYA',
        cab: String(m[idxCab] || '').trim(),
        role: String(m[idxRole] || '').trim(),
        status,
        lastId: latest ? String(latest[0] || '') : '',
        lastDate: latest ? formatDisplayDate(latest[1]) : '-',
        lastTopic: latest ? String(latest[5] || '') : ''
      });
    });

    return rows;
  }

  function getCoachingStatus(latest) {
    if (!latest) return 'BELUM COACHING';

    const raw = String(latest[7] || 'ON PROGRESS').toUpperCase().trim();
    if (raw.includes('DONE')) return 'DONE';
    if (raw.includes('NEED')) return 'NEED FU';
    if (raw.includes('OVER')) return 'OVER DUE';

    const t = new Date(latest[1]).getTime();
    if (!isNaN(t)) {
      const days = Math.floor((new Date().getTime() - t) / 86400000);
      if (days > 14) return 'OVER DUE';
    }

    return 'ON PROGRESS';
  }

  function formatDisplayDate(value) {
    if (!value) return '-';
    const d = new Date(value);
    if (isNaN(d.getTime())) return String(value).substring(0, 10);
    return d.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
  }

  function normalizeRegionLabel(region) {
    const raw = String(region || '').trim().toUpperCase();
    if (!raw) return 'LAINNYA';
    if (raw.includes('REGION 1')) return 'REGION 1';
    if (raw.includes('REGION 2')) return 'REGION 2';
    if (raw.includes('REGION 3')) return 'REGION 3';
    if (raw.includes('REGION 4')) return 'REGION 4';
    return 'LAINNYA';
  }

  function getVisibleCoachingRows() {
    return (coachingRows || []).filter(r => {
      const matchRegion = !coachingFilter.region || normalizeRegionLabel(r.region) === coachingFilter.region;
      const matchCabang = !coachingFilter.cabang || r.cab === coachingFilter.cabang;
      const matchStatus = !coachingFilter.status || r.status === coachingFilter.status;
      return matchRegion && matchCabang && matchStatus;
    });
  }

  function renderCoachingDashboard() {
    ensureCoachingBelumDefaultScope();
    renderCoachingStats();
    renderCoachingRegionCards();
    renderCoachingBranchList();
    renderCoachingJobList();
    updateCoachingScopeText();
  }

  function ensureCoachingBelumDefaultScope() {
    if (!coachingFilter.status) coachingFilter.status = 'BELUM COACHING';
  }

  function renderCoachingStats() {
    const rows = getVisibleCoachingRows();
    const total = rows.length || 0;
    const counts = {
      'BELUM COACHING': 0,
      'NEED FU': 0,
      'ON PROGRESS': 0,
      'OVER DUE': 0,
      DONE: 0
    };

    rows.forEach(r => {
      counts[r.status] = (counts[r.status] || 0) + 1;
    });

    setCoachingStat('belum', counts['BELUM COACHING'], total);
    setCoachingStat('need', counts['NEED FU'], total);
    setCoachingStat('progress', counts['ON PROGRESS'], total);
    setCoachingStat('overdue', counts['OVER DUE'], total);
    setCoachingStat('done', counts.DONE, total);
    setText('coach-stat-total', total.toLocaleString('id-ID'));
  }

  function setCoachingStat(id, value, total) {
    const pct = total > 0 ? ((value / total) * 100).toFixed(0) : '0';
    setText('coach-stat-' + id, value.toLocaleString('id-ID'));
    setText('coach-stat-' + id + '-p', pct + '%');
  }

  function renderCoachingRegionCards() {
    const box = document.getElementById('coaching-region-card-grid');
    if (!box) return;
    const map = { 'REGION 1': 0, 'REGION 2': 0, 'REGION 3': 0, 'REGION 4': 0, 'LAINNYA': 0 };
    (coachingRows || []).forEach(r => {
      if (r.status !== 'BELUM COACHING') return;
      const key = normalizeRegionLabel(r.region);
      map[key] = (map[key] || 0) + 1;
    });

    const sorted = [...coachingRegionBuckets].sort((a, b) => (map[b] || 0) - (map[a] || 0));
    const html = sorted.map((region) => {
      const count = map[region] || 0;
      const active = coachingFilter.region === region ? ' active' : '';
      return `
        <button class="coaching-region-card${active}" onclick="filterCoachingByRegion(${toJsString(region)})">
          <strong>${count.toLocaleString('id-ID')}</strong>
          <span>${escapeHtml(region)}</span>
          <small>Belum coaching</small>
        </button>
      `;
    }).join('');

    box.innerHTML = html;
  }

  function renderCoachingBranchList() {
    const box = document.getElementById('coaching-branch-list');
    if (!box) return;

    const rows = (coachingRows || []).filter(r =>
      r.status === 'BELUM COACHING' &&
      (!coachingFilter.region || normalizeRegionLabel(r.region) === coachingFilter.region)
    );
    const map = {};
    rows.forEach(r => {
      const cab = r.cab || 'CABANG LAINNYA';
      if (!map[cab]) map[cab] = { total: 0 };
      map[cab].total++;
    });

    const html = Object.keys(map)
      .sort((a, b) => (map[b].total - map[a].total) || a.localeCompare(b))
      .map(cabang => `
      <button class="hierarchy-item${coachingFilter.cabang === cabang ? ' active' : ''}" onclick="filterCoachingByBranch(${toJsString(cabang)})" ondblclick="filterCoachingByBranch(${toJsString(cabang)})">
        <span>
          <strong>${escapeHtml(cabang)}</strong>
          <small>${map[cabang].total.toLocaleString('id-ID')} staff</small>
        </span>
        <span class="hierarchy-count">${map[cabang].total.toLocaleString('id-ID')}</span>
      </button>
    `).join('');

    box.innerHTML = html || '<div class="empty-state">Belum ada data cabang belum coaching pada region ini.</div>';
  }

  function renderCoachingJobList() {
    const box = document.getElementById('coaching-job-list');
    if (!box) return;

    const rows = (coachingRows || []).filter(r =>
      r.status === 'BELUM COACHING' &&
      (!coachingFilter.region || normalizeRegionLabel(r.region) === coachingFilter.region)
    );
    const map = {};
    rows.forEach(r => {
      const jab = r.jab || 'JABATAN LAINNYA';
      if (!map[jab]) map[jab] = { total: 0 };
      map[jab].total++;
    });

    const html = Object.keys(map)
      .sort((a, b) => (map[b].total - map[a].total) || a.localeCompare(b))
      .map(jab => `
      <div class="hierarchy-item hierarchy-item-static">
        <span>
          <strong>${escapeHtml(jab)}</strong>
          <small>${map[jab].total.toLocaleString('id-ID')} staff</small>
        </span>
        <span class="hierarchy-count">${map[jab].total.toLocaleString('id-ID')}</span>
      </div>
    `).join('');

    box.innerHTML = html || '<div class="empty-state">Belum ada data jabatan belum coaching pada region ini.</div>';
  }

  function updateCoachingScopeText() {
    const statusText = coachingFilter.status || 'BELUM COACHING';
    let title = coachingFilter.region ? coachingFilter.region : 'Semua Region';
    if (coachingFilter.cabang) title += ' / ' + coachingFilter.cabang;
    title += ' - ' + statusText;

    setText('coaching-active-scope', title);
    setText('coaching-active-subtitle', `${getVisibleCoachingRows().length.toLocaleString('id-ID')} staff tampil di tabel detail.`);
  }

  function filterCoachingByStatus(status) {
    coachingFilter.status = status;
    if (status !== 'BELUM COACHING') {
      coachingFilter.region = '';
      coachingFilter.cabang = '';
    }
    coachingLastFocus = { region: coachingFilter.region, cabang: coachingFilter.cabang, status: coachingFilter.status, staffKey: selectedCoachingStaffKey };
    renderCoachingDashboard();
    sortCoachingInteractive(currentSort.col || 'nama', true);
  }

  function filterCoachingByRegion(region) {
    coachingFilter.region = region;
    coachingFilter.cabang = '';
    coachingFilter.status = 'BELUM COACHING';
    coachingLastFocus = { region: coachingFilter.region, cabang: '', status: coachingFilter.status, staffKey: selectedCoachingStaffKey };
    renderCoachingDashboard();
    sortCoachingInteractive(currentSort.col || 'nama', true);
  }

  function filterCoachingByBranch(cabang) {
    coachingFilter.cabang = cabang;
    if (!coachingFilter.status) coachingFilter.status = 'BELUM COACHING';
    coachingLastFocus = { region: coachingFilter.region, cabang: coachingFilter.cabang, status: coachingFilter.status, staffKey: selectedCoachingStaffKey };
    renderCoachingDashboard();
    sortCoachingInteractive(currentSort.col || 'nama', true);
  }

  function resetCoachingScope() {
    coachingFilter = { level: 'all', region: '', cabang: '', status: 'BELUM COACHING' };
    selectedCoachingStaffKey = '';
    coachingLastFocus = { region: '', cabang: '', status: 'BELUM COACHING', staffKey: '' };
    const search = document.getElementById('coaching-search');
    if (search) search.value = '';
    renderCoachingDashboard();
    sortCoachingInteractive(currentSort.col || 'nama', true);
  }

  function filterCoachingDetailTable() {
    sortCoachingInteractive(currentSort.col || 'nama', true);
  }

  function sortCoachingInteractive(col, keepDirection) {
    const data = getVisibleCoachingRows().filter(r => {
      const keyword = (getValue('coaching-search') || '').toLowerCase().trim();
      if (!keyword) return true;
      return [r.nik, r.nama, r.region, r.cab, r.jab, r.status]
        .join(' ')
        .toLowerCase()
        .includes(keyword);
    });

    if (!data) return;

    if (keepDirection !== true) {
      if (currentSort.col === col) currentSort.asc = !currentSort.asc;
      else {
        currentSort.col = col;
        currentSort.asc = true;
      }
    } else {
      currentSort.col = col;
    }

    data.sort((a, b) => {
      const vA = String(a[col] || '').toLowerCase();
      const vB = String(b[col] || '').toLowerCase();
      if (vA < vB) return currentSort.asc ? -1 : 1;
      if (vA > vB) return currentSort.asc ? 1 : -1;
      return 0;
    });

    const h = data.map(r => {
      const staffKey = `${r.nik}__${r.nama}`;
      const activeClass = selectedCoachingStaffKey === staffKey ? 'coaching-row-active' : '';
      return `
      <tr class="${activeClass}" onclick="handleRowClickCoaching(${toJsString(r.nik)}, ${toJsString(r.nama)}, ${toJsString(r.cab)}, ${toJsString(r.lastId)}, ${toJsString(r.region)})" ondblclick="handleRowClickCoaching(${toJsString(r.nik)}, ${toJsString(r.nama)}, ${toJsString(r.cab)}, ${toJsString(r.lastId)}, ${toJsString(r.region)})">
        <td>${escapeHtml(r.nik)}</td>
        <td><b>${escapeHtml(r.nama)}</b></td>
        <td>${escapeHtml(r.region)}</td>
        <td>${escapeHtml(r.cab)}</td>
        <td>${escapeHtml(r.jab)}</td>
        <td><span class="coaching-status-badge ${getCoachingBadgeClass(r.status)}">${escapeHtml(r.status)}</span></td>
        <td>${escapeHtml(r.lastDate)}</td>
      </tr>
    `;
    }).join('');

    const body = document.getElementById('coaching-table-body');
    if (body) body.innerHTML = h || "<tr><td colspan='7' class='empty-state'>Belum ada data coaching pada filter ini.</td></tr>";
    setText('coaching-table-subtitle', `${data.length.toLocaleString('id-ID')} staff tampil. Klik baris staff untuk mengisi form coaching.`);
  }

  function getCoachingBadgeClass(status) {
    const s = String(status || '').toUpperCase();
    if (s === 'BELUM COACHING') return 'badge-belum-coaching';
    if (s === 'NEED FU') return 'badge-need-fu';
    if (s === 'ON PROGRESS') return 'badge-on-progress';
    if (s === 'OVER DUE') return 'badge-over-due';
    if (s === 'DONE') return 'badge-done';
    return 'badge-on-progress';
  }

  function handleRowClickCoaching(nik, nama, cab, lastId, region) {
    selectedCoachingStaffKey = `${nik}__${nama}`;
    coachingLastFocus = { region: coachingFilter.region, cabang: coachingFilter.cabang, status: coachingFilter.status || 'BELUM COACHING', staffKey: selectedCoachingStaffKey };
    setValue('c-staff', nama || '');
    setValue('c-cabang', cab || '');
    setValue('c-parent-id', lastId || '');
    setValue('c-region', region || '');
    clearCoachingFieldErrors();

    if (lastId) {
      Swal.fire({
        icon: 'info',
        title: 'Follow Up Coaching',
        text: 'Karyawan sudah memiliki data coaching. Input ini akan disimpan sebagai tindak lanjut.'
      });
    }

    switchPage('coaching', true);
    const form = document.getElementById('coaching-form-section');
    if (form) form.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function startNewCoachingInput() {
    selectedCoachingStaffKey = '';
    setValue('c-parent-id', '');
    setValue('c-staff', '');
    setValue('c-cabang', '');
    setValue('c-region', coachingFilter.region || '');
    setValue('c-root', '');
    setValue('c-topic', '');
    setValue('c-target', '');
    setValue('c-bm', '');
    setValue('c-perf', '');
    clearCoachingFieldErrors();
    const form = document.getElementById('coaching-form-section');
    if (form) form.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function clearCoachingFieldErrors() {
    ['c-staff', 'c-cabang', 'c-region', 'c-root', 'c-topic', 'c-target'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.classList.remove('input-error');
    });
  }

  function validateCoachingForm(obj) {
    const required = [
      { id: 'c-staff', value: obj.staff, label: 'Nama Staff' },
      { id: 'c-cabang', value: obj.cabang, label: 'Cabang' },
      { id: 'c-region', value: obj.region, label: 'Region' },
      { id: 'c-root', value: obj.root, label: 'Root Cause' },
      { id: 'c-topic', value: obj.topic, label: 'Topic Coaching' },
      { id: 'c-target', value: obj.target, label: 'Target / Action Plan' }
    ];

    clearCoachingFieldErrors();
    const missing = required.filter(f => !String(f.value || '').trim());
    missing.forEach(f => {
      const el = document.getElementById(f.id);
      if (el) el.classList.add('input-error');
    });

    return missing;
  }

  function saveCoachingInteractive() {
    const obj = {
      cabang: getValue('c-cabang'),
      staff: getValue('c-staff'),
      root: getValue('c-root'),
      topic: getValue('c-topic'),
      target: getValue('c-target'),
      parentId: getValue('c-parent-id'),
      bm: getValue('c-bm'),
      region: getValue('c-region'),
      lastPerf: getValue('c-perf')
    };

    const missing = validateCoachingForm(obj);
    if (missing.length) {
      Swal.fire('Validasi', `Field wajib belum lengkap: ${missing.map(f => f.label).join(', ')}`, 'warning');
      return;
    }

    Swal.fire({
      title: 'Menyimpan...',
      allowOutsideClick: false,
      didOpen: () => Swal.showLoading()
    });

    google.script.run
      .withSuccessHandler(() => {
        Swal.fire('Sukses', 'Data Coaching / Follow-Up tersimpan.', 'success');
        coachingLastFocus = {
          region: obj.region || coachingFilter.region || '',
          cabang: obj.cabang || coachingFilter.cabang || '',
          status: 'BELUM COACHING',
          staffKey: selectedCoachingStaffKey
        };
        clearCoachingForm();
        fetchCoachingAddon();
      })
      .withFailureHandler(err => {
        Swal.fire('Error', err && err.message ? err.message : 'Gagal menyimpan coaching', 'error');
      })
      .saveCoachingAction(obj);
  }

  function clearCoachingForm() {
    ['c-staff', 'c-cabang', 'c-root', 'c-topic', 'c-target', 'c-parent-id', 'c-bm', 'c-region', 'c-perf']
      .forEach(id => setValue(id, ''));
  }

  function debounceSearch() {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => filterTablePipe(), 200);
  }

  function getValue(id) {
    const el = document.getElementById(id);
    return el ? el.value : '';
  }

  function setValue(id, value) {
    const el = document.getElementById(id);
    if (el) el.value = value;
  }

  function setText(id, value) {
    const el = document.getElementById(id);
    if (el) el.innerText = value;
  }

  function escapeHtml(value) {
    return String(value || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function toJsString(value) {
    return JSON.stringify(String(value || ''));
  }
</script>
